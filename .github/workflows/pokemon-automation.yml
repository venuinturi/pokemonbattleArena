name: Pokemon Battle Automation

on:
  # Schedule to run at 2:30 PM IST (09:00 UTC) every day
  schedule:
    - cron: '0 9 * * *'
  # Allow manual triggers from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Trainer Battles
        run: mvn test -Dcucumber.filter.tags="@trainer" -Dheadless=true

      - name: Run Hunting
        if: always()
        run: mvn test -Dcucumber.filter.tags="@hunt" -Dheadless=true
